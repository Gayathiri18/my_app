<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Innerly</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
</head>
<body>

  <!-- Home Dashboard -->
  <div id="home-view" class="view">
    <div class="header">
      <h1>Innerly</h1>
    </div>
    <div class="dashboard-grid">
      <div class="card" onclick="showView('todo-view')">✅ To-Do List</div>
      <div class="card" onclick="alert('Feature 2 coming soon')">📅 My Schedule</div>
    </div>
  </div>

  <!-- To-Do Feature View -->
  <div id="todo-view" class="view" style="display:none;">
    <div class="header">
      <button onclick="showView('home-view')">Back</button>
      <h1>To-Do List</h1>
    </div>
    <div class="input-area">
      <input type="text" id="taskInput" placeholder="Add a new task..." />
      <button onclick="addTask()">Add</button>
    </div>
    <ul id="taskList"></ul>
  </div>

  <script src="app.js"></script>
</body>
</html>
