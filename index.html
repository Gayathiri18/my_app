<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Innerly</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
</head>
<body>

  <div id="home-view" class="view">
    <div class="header"><h1>Innerly</h1></div>

    <div class="category-section">
      <h3 class="collapsible" onclick="toggleSection(this)">📆 Time & Planning ▼</h3>
      <div class="content" style="display: none;">
        <div class="card" onclick="showView('todo-view')">✅ To-Do List</div>
        <div class="card" onclick="showView('events-view')">🗓️ Important Events</div>
      </div>
    </div>
    </div>

  <div id="todo-view" class="view" style="display:none;">
    <div class="header"><button onclick="showView('home-view')">Back</button><h1>To-Do List</h1></div>
    <div class="input-area"><input type="text" id="taskInput" /><button onclick="addTask()">Add</button></div>
    <ul id="taskList"></ul>
  </div>

  <div id="events-view" class="view" style="display:none;">
    <div class="header"><button onclick="showView('home-view')">Back</button><h1>Upcoming Events</h1></div>
    <div class="input-area">
      <input type="text" id="eventName" placeholder="Event name..." />
      <input type="date" id="eventDate" />
      <textarea id="eventDetails" placeholder="Details..."></textarea>
      <button onclick="addEvent()">Add Event</button>
    </div>
    <ul id="eventList" class="event-list"></ul>
  </div>

  <script src="app.js"></script>
</body>
</html>
